name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install
        uses: ./.github/actions/install-dependencies
      - name: Lint
        uses: ./.github/actions/lint
      - name: Build
        uses: ./.github/actions/build-packages
      - name: Clean tree check
        uses: ./.github/actions/clean-tree-check
      - name: Tests
        uses: ./.github/actions/test
  my-tag:
    name: "My tag"
    needs: [ci]
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - id: tag
        run: echo "tag=$(git tag --contains | head -n 1)" >> "$GITHUB_OUTPUT"
  version:
    name: Bump versions
    needs: [my-tag]
    if: ${{ !needs.my-tag.outputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.COMMIT_TOKEN }}
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install
        uses: ./.github/actions/install-dependencies
      - name: Git Setup
        uses: ./.github/actions/git-setup
      - name: Version Bump
        uses: ./.github/actions/version-bump
  release:
    name: Release
    needs: [my-tag]
    if: needs.my-tag.outputs.tag
    runs-on: [coveo, linux, x64, ec2]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install
        uses: ./.github/actions/install-dependencies
      - name: Build
        uses: ./.github/actions/build-packages
      - name: Publish
        uses: ./.github/actions/publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Deploy
        uses: ./.github/actions/deploy
        with:
          COMMIT_HASH: ${{ github.sha }}
