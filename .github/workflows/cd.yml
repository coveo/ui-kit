name: CD
on:
  schedule:
    # At 02:00 (UTC) Wednesday/ 21:00 (ETC) every Tuesday.
    - cron: '0 2 * * 3'
  merge_group:
  workflow_dispatch:
    inputs:
      version:
        description: '⚠ be sure of yourself ⚠'
        required: false
        default: ''
        type: string
      debug:
        description: 'Add DEBUG=* to the env if true'
        type: boolean
        default: false
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  release:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ inputs.version || '' }}
      debug: ${{ inputs.debug || false }}
      is-manual: ${{ github.event_name == 'workflow_dispatch' }}
    secrets:
      RELEASER_APP_ID: ${{ secrets.RELEASER_APP_ID }}
      RELEASER_PRIVATE_KEY: ${{ secrets.RELEASER_PRIVATE_KEY }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      UI_KIT_CD_DISPATCHER: ${{ secrets.UI_KIT_CD_DISPATCHER }}
      SFDX_AUTH_CLIENT_ID: ${{ secrets.SFDX_AUTH_CLIENT_ID }}
      SFDX_AUTH_JWT_KEY: ${{ secrets.SFDX_AUTH_JWT_KEY }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
  canary:
    if: ${{ github.event_name == 'merge_group' }}
    uses: ./.github/workflows/canary.yml
