name: Release

# RELEASE FLOW:
#
# On every push to main, the changesets/action either:
#   A) Opens/updates a "Version Packages" PR if there are pending changesets
#   B) Publishes packages if changesets were just consumed (release PR merged)
#
# When publishing (no pending changesets):
#   1. Build packages and publish to npm (changeset publish)
#   2. Deploy to CDN
#   3. Promote Quantic SFDX package, build typedocs, notify docs

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          load-cache: false
          save-cache: true
          cache-retention-days: 7

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1
        with:
          version: pnpm changeset version
          publish: pnpm run release
          title: 'ci(changesets): version packages'
          commit: 'ci(changesets): version packages'
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cdn-prod:
    name: CDN Production
    needs: release
    if: ${{ needs.release.outputs.published == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - name: Deploy to CDN
        run: node ./scripts/deploy/trigger-ui-kit-cd.mjs
        env:
          GH_TOKEN: ${{ secrets.UI_KIT_CD_DISPATCHER }}

  npm-prod:
    name: NPM Production
    needs: [release, cdn-prod]
    if: ${{ needs.release.outputs.published == 'true' }}
    runs-on: ubuntu-latest
    environment: 'NPM Production'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - name: Publish NPM packages to latest
        run: pnpm run publish:npm:latest
        env:
          NPM_TAG: latest

  quantic-prod:
    name: Quantic Production
    needs: [release, cdn-prod]
    if: ${{ needs.release.outputs.published == 'true' }}
    runs-on: ubuntu-latest
    environment: 'Quantic Production'
    permissions:
      contents: read
      packages: write
      discussions: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/setup-sfdx
      - name: Promote SFDX package to production
        run: |
          echo "${{ secrets.SFDX_AUTH_JWT_KEY }}" > ${{ vars.SFDX_AUTH_JWT_KEY_FILE }}
          pnpm exec turbo run @coveo/quantic#promote:sfdx:ci
          rm ${{ vars.SFDX_AUTH_JWT_KEY_FILE }}
        env:
          SFDX_AUTH_CLIENT_ID: ${{ secrets.SFDX_AUTH_CLIENT_ID }}
          SFDX_AUTH_JWT_KEY: ${{ secrets.SFDX_AUTH_JWT_KEY }}
          SFDX_AUTH_JWT_USERNAME: ${{ vars.SFDX_AUTH_JWT_USERNAME }}
          SFDX_AUTH_JWT_KEY_FILE: ${{ vars.SFDX_AUTH_JWT_KEY_FILE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ./packages/quantic

  typedoc-headless:
    name: Typedoc Headless
    needs: [release, cdn-prod]
    if: ${{ needs.release.outputs.published == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup

      - name: Build typedoc site
        run: pnpm run build:typedoc
        working-directory: packages/headless
        shell: bash

      - name: Read version from package.json
        id: read_version
        run: |
          VERSION=$(jq -r '.version' packages/headless/package.json)
          echo "Extracted version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Copy the docs into the version folder
        run: |
          mkdir -p typedoc-headless-site/${{ env.version }}/
          cp -r packages/headless/docs/* typedoc-headless-site/${{ env.version }}/
          echo "Copied docs to: typedoc-headless-site/${{ env.version }}/"

      - name: Upload documentation artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: headless-docs-${{ env.version }}
          path: typedoc-headless-site/

  typedoc-headless-react:
    name: Typedoc Headless React
    needs: [release, cdn-prod]
    if: ${{ needs.release.outputs.published == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup

      - name: Build typedoc site
        run: pnpm run build:typedoc
        working-directory: packages/headless-react
        shell: bash

      - name: Read version from package.json
        id: read_version
        run: |
          VERSION=$(jq -r '.version' packages/headless-react/package.json)
          echo "Extracted version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Copy the docs into the version folder
        run: |
          mkdir -p typedoc-headless-react-site/${{ env.version }}/
          cp -r packages/headless-react/docs/* typedoc-headless-react-site/${{ env.version }}/
          echo "Copied docs to: typedoc-headless-react-site/${{ env.version }}/"

      - name: Upload documentation artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: headless-react-docs-${{ env.version }}
          path: typedoc-headless-react-site/

  docs-prod:
    name: Docs Production
    needs: [release, cdn-prod]
    if: ${{ needs.release.outputs.published == 'true' }}
    runs-on: ubuntu-latest
    environment: 'Docs Production'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@20cf305ff2072d973412fa9b1e3a4f227bda3c76 # v2.14.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - name: Notify Docs
        run: pnpm run notify:docs
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
