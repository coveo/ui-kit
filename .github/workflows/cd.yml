name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Bump versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Git Setup
        uses: ./.github/actions/git-setup
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      - name: Version Bump
        uses: ./.github/actions/version-bump
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    needs: [version]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Publish
        uses: ./.github/actions/publish
  deploy:
    name: Deploy package
    runs-on: [coveo, linux, x64, ec2]
    needs: [publish]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Build
        uses: ./.github/actions/build-packages
      - name: Deploy
        uses: ./.github/actions/deploy
