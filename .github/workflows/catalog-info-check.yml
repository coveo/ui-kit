name: Catalog Info Check
on:
  pull_request:
    paths:
      - 'packages/*/package.json'
      - 'packages/*/catalog-info.yaml'
      - 'packages/*/catalog-info.config.yaml'
      - 'catalog-info.yaml'
      - 'catalog-info.ui-kit.yaml'
      - 'catalog-info.ui-kit.config.yaml'
      - 'scripts/generate-catalog-info.mjs'
  merge_group:

permissions:
  contents: read

jobs:
  check-catalog-info:
    name: 'Verify catalog-info files are up to date'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: step-security/mise-action@v4
        with:
          install: true
          cache: true
      - run: node scripts/generate-catalog-info.mjs
      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain '**/catalog-info.yaml' 'catalog-info.ui-kit.yaml')" ]; then
            echo "::error::catalog-info files are out of date. Run 'node scripts/generate-catalog-info.mjs' and commit the results."
            git diff --stat
            exit 1
          fi
