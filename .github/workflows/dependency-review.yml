name: 'Dependency Review'

on:
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-Review:
    name: Review
    uses: coveo/public-actions/.github/workflows/dependency-review.yml@ccfa9ee293979b939a1ec334a905fb0c880d488f # main
    with:
      public: true
      distributed: true
      runs-on: '["ubuntu-latest"]'
