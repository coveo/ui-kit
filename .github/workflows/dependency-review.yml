name: 'Dependency Review'

on:
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-Review:
    name: Review
    uses: coveo/public-actions/.github/workflows/dependency-review.yml@ed99d9f3a9c58c12a23d0ae5bbf1a5b059bfbf0c # main
    with:
      public: true
      distributed: true
      runs-on: '["ubuntu-latest"]'
