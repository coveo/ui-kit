name: Release

on:
  push:
    tags:
      - "**/v**"

concurrency:
  group: "${{ github.workflow }} @ ${{ github.ref }}"
  cancel-in-progress: true

jobs:
  get-branch:
    name: Get branch
    runs-on: ubuntu-latest
    outputs:
      branchName: ${{ steps.branch.outputs.branchName }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Set Branch Name
        id: branch
        shell: bash
        run: |
          echo "branchName=$(git rev-parse --abbrev-ref HEAD)" >> $GITHUB_OUTPUT
  publish:
    name: Publish package
    needs: [get-branch]
    if: needs.get-branch-outputs.branchName == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Git Setup
        uses: ./.github/actions/git-setup
      - name: Publish
        uses: ./.github/actions/publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
  changeset:
    name: Get changeset
    runs-on: ubuntu-latest
    needs: [publish]
    outputs:
      commitHash: ${{ steps.commit.outputs.hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/github-script@v6
        id: commit
        with:
          script: |
            const getCommitHash = require('./.github/actions/deploy/get-changeset.cjs');
            getCommitHash().then(commitHash => {
              console.info(commitHash);
              core.setOutput('hash', commitHash);
            });
  deploy:
    name: Deploy package
    runs-on: [coveo, linux, x64, ec2]
    needs: [changeset]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Build
        uses: ./.github/actions/build-packages
      - name: Deploy
        uses: ./.github/actions/deploy
        with:
          COMMIT_HASH: ${{ needs.changeset.outputs.commitHash }}
