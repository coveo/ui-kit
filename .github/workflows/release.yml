name: Release

on:
  push:
    tags:
      - "**/v**"
    branches:
      - main

concurrency:
  group: "${{ github.workflow }} @ ${{ github.ref }}"
  cancel-in-progress: true

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Git Setup
        uses: ./.github/actions/git-setup
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      - name: Publish
        uses: ./.github/actions/publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
  changeset:
    name: Get changeset
    runs-on: ubuntu-latest
    needs: [publish]
    outputs:
      commitHash: ${{ steps.commit.outputs.hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/github-script@v6
        id: commit
        with:
          script: |
            const getCommitHash = require('./.github/actions/deploy/get-changeset.cjs');
            getCommitHash().then(commitHash => {
              console.info(commitHash);
              core.setOutput('hash', commitHash);
            });
  deploy:
    name: Deploy package
    runs-on: [coveo, linux, x64, ec2]
    needs: [changeset]
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Build
        uses: ./.github/actions/build-packages
      - name: Deploy
        uses: ./.github/actions/deploy
        with:
          COMMIT_HASH: ${{ needs.changeset.outputs.commitHash }}
