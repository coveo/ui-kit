name: 'Changeset merge guard'
description: >
  Detects stale version PRs in a merge queue group by checking whether
  unprocessed changeset files still exist after the version-packages commit.
  Requires the repository to be checked out with full history (fetch-depth: 0).
inputs:
  base-sha:
    description: 'Base SHA of the merge group'
    required: true
  head-sha:
    description: 'Head SHA of the merge group'
    required: true
runs:
  using: composite
  steps:
    - name: Check for stale version PR in merge group
      shell: bash
      env:
        BASE_SHA: ${{ inputs.base-sha }}
        HEAD_SHA: ${{ inputs.head-sha }}
      run: |
        set -euo pipefail

        echo "Checking commits in range ${BASE_SHA}..${HEAD_SHA}"

        if ! COMMITS=$(git log --format='%s' "${BASE_SHA}..${HEAD_SHA}"); then
          echo "::error::Failed to resolve commit range. Ensure the repository is checked out with sufficient history (fetch-depth: 0)."
          exit 1
        fi

        VERSION_PR_FOUND=$(echo "$COMMITS" | grep -cE '^ci\(changesets\): version packages' || true)

        if [ "$VERSION_PR_FOUND" -eq 0 ]; then
          echo "No version PR in this merge group. Skipping check."
          exit 0
        fi

        echo "Version PR detected in merge group. Checking for unprocessed changesets..."

        CHANGESET_FILES=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null)

        if [ -n "$CHANGESET_FILES" ]; then
          echo "::error::Stale version PR detected! The following changeset files are unprocessed:"
          echo "$CHANGESET_FILES"
          echo ""
          echo "This means another PR in the merge queue added changesets that the version PR doesn't include."
          echo "The version PR needs to be updated before merging."
          exit 1
        fi

        echo "All changesets are accounted for. Good to merge."
