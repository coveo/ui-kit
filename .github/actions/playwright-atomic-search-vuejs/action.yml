name: 'Playwright Atomic Vue'
description: 'Run Playwright tests for Atomic Vue'
inputs:
  github-token:
    description: The GitHub token for accurately detecting a build vs a re-run build
    required: false
    default: ''
runs:
  using: composite
  steps:
    - name: Run Playwright tests
      run: pnpm exec playwright test
      working-directory: samples/atomic/search-vuejs
      shell: bash
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: failure()
      with:
        name: vuejs-screenshots
        path: samples/atomic/search-vuejs/playwright-report/
