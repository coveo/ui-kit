name: 'Playwright pkg-new-template'
description: 'Run Playwright smoke tests for the pkg.pr.new template'
runs:
  using: composite
  steps:
    - name: Run Playwright tests
      run: pnpm exec playwright test
      working-directory: packages/pkg-new-template
      shell: bash
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: failure()
      with:
        name: pkg-new-template-playwright-report
        path: packages/pkg-new-template/playwright-report/
