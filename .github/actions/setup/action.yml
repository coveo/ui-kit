#region Metadata
name: 'Setup & build'
description: 'Setup node, install dependencies & build'
inputs:
  save-cache:
    description: 'Whether to save the turbo cache. Note: pnpm is cached via setup-node.'
    required: false
    default: 'false'
  load-cache:
    description: 'Whether to load the turbo cache. Note: pnpm is cached via setup-node.'
    required: false
    default: 'true'
  cache-prefix:
    description: 'Prefix to add to the cache key for different environments'
    required: false
    default: 'default'
  skip-build:
    description: 'Skip the build step'
    required: false
    default: 'false'
  build-command:
    description: 'Command used to build. Defaults to building every package.'
    required: false
    default: 'pnpm run build'
  cache-retention-days:
    description: 'Number of days to retain the cache artifact'
    required: false
    default: '1'
#endregion
runs:
  using: composite
  steps:
    #region PNPM
    # Note: pnpm dependencies are cached automatically by setup-node (cache: 'pnpm')
    # The load-cache/save-cache inputs only control turbo cache artifacts
    - name: Install pnpm
      uses: step-security/action-setup@3d419c73e38e670dbffe349ffff26dd13c164640 # v4.2.0
      with:
        run_install: false
    - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
      with:
        node-version-file: '.nvmrc'
        registry-url: 'https://registry.npmjs.org'
        cache: 'pnpm'
    - run: pnpm install --frozen-lockfile --prefer-offline
      shell: bash
    #endregion
    #region Caches
    # Turbo cache (controlled by load-cache input)
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      if: inputs.save-cache != 'true' && inputs.load-cache == 'true'
      with:
        name: ${{ runner.os }}-${{ inputs.cache-prefix }}-turbo
        path: .turbo
    #endregion
    #region Build
    - run: ${{ inputs.build-command }}
      if: inputs.skip-build != 'true'
      shell: bash
    # Save turbo cache (controlled by save-cache input)
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: inputs.save-cache == 'true'
      with:
        name: ${{ runner.os }}-${{ inputs.cache-prefix }}-turbo
        path: .turbo
        include-hidden-files: true
        retention-days: ${{ inputs.cache-retention-days }}
        if-no-files-found: error
#endregion
