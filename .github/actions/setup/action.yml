#region Metadata
name: 'Setup & build'
description: 'Setup node, install dependencies & build'
inputs:
  save-cache:
    description: 'Whether to save the turbo cache. Note: pnpm is cached via setup-node.'
    required: false
    default: 'false'
  load-cache:
    description: 'Whether to load the turbo cache. Note: pnpm is cached via setup-node.'
    required: false
    default: 'true'
  cache-prefix:
    description: 'Prefix to add to the cache key for different environments'
    required: false
    default: 'default'
  skip-build:
    description: 'Skip the build step'
    required: false
    default: 'false'
  cache-retention-days:
    description: 'Number of days to retain the cache artifact'
    required: false
    default: '1'
#endregion
runs:
  using: composite
  steps:
#region PNPM
    # Note: pnpm dependencies are cached automatically by setup-node (cache: 'pnpm')
    # The load-cache/save-cache inputs only control turbo cache artifacts
    - name: Install pnpm
      uses: step-security/action-setup@3d419c73e38e670dbffe349ffff26dd13c164640 # v4.2.0
      with:
        run_install: false
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version-file: '.nvmrc'
        registry-url: 'https://registry.npmjs.org'
        cache: 'pnpm'
    - name: Start npm traffic measurement
      continue-on-error: true
      shell: bash
      run: bash "${{ github.action_path }}/measure-registry-traffic.sh" start
    - run: pnpm install --frozen-lockfile --prefer-offline
      shell: bash
    - name: Stop npm traffic measurement
      if: ${{ !cancelled() }}
      id: npm-traffic
      continue-on-error: true
      shell: bash
      run: |
          REPORT_PATH="$(bash "${{ github.action_path }}/measure-registry-traffic.sh" stop)"
          echo "report_path=$REPORT_PATH" >> "$GITHUB_OUTPUT"
          echo "artifact_name=npm-traffic-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}-$(date +%s%N)" >> "$GITHUB_OUTPUT"
    - name: Upload npm traffic artifact
      if: ${{ !cancelled() && steps.npm-traffic.outputs.report_path != '' }}
      continue-on-error: true
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
      with:
          name: ${{ steps.npm-traffic.outputs.artifact_name }}
          path: ${{ steps.npm-traffic.outputs.report_path }}
          retention-days: 7
#endregion
#region Caches
    # Cypress cache
    - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.cache/Cypress
        key: ${{ runner.os }}-${{ inputs.cache-prefix }}-cy-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-${{ inputs.cache-prefix }}-cy-
    # Turbo cache (controlled by load-cache input)
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      if: inputs.save-cache != 'true' && inputs.load-cache == 'true'
      with:
        name: ${{ runner.os }}-${{ inputs.cache-prefix }}-turbo
        path: .turbo
#endregion
#region Build
    - run: pnpm run build
      if: inputs.skip-build != 'true'
      shell: bash
    # Save turbo cache (controlled by save-cache input)
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      if: inputs.save-cache == 'true'
      with:
        name: ${{ runner.os }}-${{ inputs.cache-prefix }}-turbo
        path: .turbo
        include-hidden-files: true
        retention-days: ${{ inputs.cache-retention-days }}
        if-no-files-found: error
#endregion
