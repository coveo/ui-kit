#region Metadata
name: 'Setup & build'
description: 'Setup node, install dependencies & build'
inputs:
  save-cache:
    description: 'Whether to save the turbo cache.'
    required: false
    default: 'false'
  load-cache:
    description: 'Whether to load the turbo cache.'
    required: false
    default: 'true'
  cache-prefix:
    description: 'Prefix to add to the cache key for different environments'
    required: false
    default: 'default'
  skip-build:
    description: 'Skip the build step'
    required: false
    default: 'false'
  build-command:
    description: 'Command used to build. Defaults to building every package.'
    required: false
    default: 'pnpm run build'
  cache-retention-days:
    description: 'Number of days to retain the cache artifact'
    required: false
    default: '1'
#endregion
runs:
  using: composite
  steps:
    #region Mise (Node + pnpm)
    - name: Install tools via mise
      uses: step-security/mise-action@v4
      with:
        install: true
        cache: true
    - name: Get pnpm store directory
      id: pnpm-store
      run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"
      shell: bash
    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-
    - run: pnpm install --frozen-lockfile --prefer-offline
      shell: bash
    #endregion
    #region Caches
    # Turbo cache (controlled by load-cache input)
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      if: inputs.save-cache != 'true' && inputs.load-cache == 'true'
      with:
        name: ${{ runner.os }}-${{ inputs.cache-prefix }}-turbo
        path: .turbo
    #endregion
    #region Build
    - run: ${{ inputs.build-command }}
      if: inputs.skip-build != 'true'
      shell: bash
    # Save turbo cache (controlled by save-cache input)
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: inputs.save-cache == 'true'
      with:
        name: ${{ runner.os }}-${{ inputs.cache-prefix }}-turbo
        path: .turbo
        include-hidden-files: true
        retention-days: ${{ inputs.cache-retention-days }}
        if-no-files-found: error
#endregion
