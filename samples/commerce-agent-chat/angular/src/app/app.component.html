<cac-chat-interface
  heading="Commerce Agent Chat (Angular)"
  [error]="state().error ?? ''"
  (clear)="clearMessages()"
  (dismiss-error)="dismissError()"
>
  <app-message-list
    slot="messages"
    [messages]="state().messages"
    [isLoading]="state().isLoading"
    [progressSteps]="state().progressSteps"
    [progressTrace]="state().progressTrace"
    (actionSelected)="sendMessage($event)"
  />
  <app-message-input
    slot="input"
    [disabled]="state().isLoading"
    (send)="sendMessage($event)"
  />
</cac-chat-interface>
