<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search — Coveo Atomic PR preview</title>
    <script type="module">
      import {defineCustomElements} from '@coveo/atomic/loader';
      import '@coveo/atomic/themes/coveo.css';
      defineCustomElements();
    </script>
    <script type="module">
      await customElements.whenDefined('atomic-search-interface');
      const searchInterface = document.querySelector('atomic-search-interface');

      await searchInterface.initialize({
        accessToken: 'xx564559b1-0045-48e1-953c-3addd1ee4457',
        organizationId: 'searchuisamples',
      });

      searchInterface.executeFirstSearch();
    </script>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
      }
      nav {
        padding: 0.75rem 1rem;
        background: #f5f5f5;
        border-bottom: 1px solid #ddd;
        font-size: 0.875rem;
      }
      nav a {
        color: #1a73e8;
        text-decoration: none;
      }
      nav a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <nav><a href="./index.html">← Back</a></nav>

    <atomic-search-interface>
      <atomic-search-layout>
        <atomic-layout-section section="search">
          <atomic-search-box></atomic-search-box>
        </atomic-layout-section>
        <atomic-layout-section section="facets">
          <atomic-facet-manager>
            <atomic-facet
              field="objecttype"
              label="Type"
              tabs-excluded='["youtube"]'
            ></atomic-facet>
            <atomic-facet
              field="author"
              label="Author"
              tabs-included='["all", "articles"]'
            ></atomic-facet>
          </atomic-facet-manager>
        </atomic-layout-section>
        <atomic-layout-section section="main">
          <atomic-tab-manager>
            <atomic-tab name="all" label="All"></atomic-tab>
            <atomic-tab name="articles" label="Articles"></atomic-tab>
            <atomic-tab
              name="youtube"
              label="YouTube"
              expression="@filetype=YouTubeVideo"
            ></atomic-tab>
          </atomic-tab-manager>
          <atomic-layout-section section="status">
            <atomic-breadbox></atomic-breadbox>
            <atomic-query-summary></atomic-query-summary>
            <atomic-sort-dropdown>
              <atomic-sort-expression
                label="Relevance"
                expression="relevancy"
              ></atomic-sort-expression>
              <atomic-sort-expression
                label="Date (newest)"
                expression="date descending"
                tabs-included='["articles"]'
              ></atomic-sort-expression>
            </atomic-sort-dropdown>
            <atomic-did-you-mean></atomic-did-you-mean>
            <atomic-refine-toggle></atomic-refine-toggle>
          </atomic-layout-section>
          <atomic-layout-section section="results">
            <atomic-result-list>
              <atomic-result-template>
                <template>
                  <atomic-result-section-title>
                    <atomic-result-link></atomic-result-link>
                  </atomic-result-section-title>
                  <atomic-result-section-excerpt>
                    <atomic-result-text field="excerpt"></atomic-result-text>
                  </atomic-result-section-excerpt>
                </template>
              </atomic-result-template>
            </atomic-result-list>
          </atomic-layout-section>
          <atomic-layout-section section="pagination">
            <atomic-pager></atomic-pager>
          </atomic-layout-section>
        </atomic-layout-section>
      </atomic-search-layout>
    </atomic-search-interface>
  </body>
</html>
