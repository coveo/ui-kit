<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Atomic Search Sample</title>
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <img src="/coveo-logo.svg" alt="Coveo" width="119" height="30" />
        <h1>Atomic Search + Vite</h1>
      </div>
    </header>

    <atomic-search-interface>
      <atomic-search-layout>
        <atomic-layout-section section="search">
          <atomic-search-box>
            <atomic-search-box-recent-queries></atomic-search-box-recent-queries>
            <atomic-search-box-query-suggestions></atomic-search-box-query-suggestions>
            <atomic-search-box-instant-results image-size="small">
              <atomic-result-template>
                <template>
                  <atomic-result-section-title>
                    <atomic-result-link></atomic-result-link>
                  </atomic-result-section-title>
                  <atomic-result-section-excerpt>
                    <atomic-result-text field="excerpt"></atomic-result-text>
                  </atomic-result-section-excerpt>
                </template>
              </atomic-result-template>
            </atomic-search-box-instant-results>
          </atomic-search-box>
        </atomic-layout-section>

        <atomic-layout-section section="facets">
          <atomic-facet-manager>
            <atomic-category-facet
              field="ec_category"
              label="Category"
              delimiting-character="|"
            ></atomic-category-facet>
            <atomic-facet field="article_type" label="Article type"></atomic-facet>
            <atomic-facet field="robot_series" label="Robot series"></atomic-facet>
            <atomic-facet field="difficulty_level" label="Difficulty"></atomic-facet>
            <atomic-facet field="author" label="Author"></atomic-facet>
          </atomic-facet-manager>
        </atomic-layout-section>

        <atomic-layout-section section="main">
          <atomic-layout-section section="status">
            <atomic-breadbox></atomic-breadbox>
            <atomic-query-summary></atomic-query-summary>
            <atomic-sort-dropdown>
              <atomic-sort-expression
                label="Relevance"
                expression="relevancy"
              ></atomic-sort-expression>
              <atomic-sort-expression
                label="Newest"
                expression="date descending"
              ></atomic-sort-expression>
              <atomic-sort-expression
                label="Oldest"
                expression="date ascending"
              ></atomic-sort-expression>
            </atomic-sort-dropdown>
          </atomic-layout-section>

          <atomic-layout-section section="results">
            <atomic-result-list>
              <atomic-result-template>
                <template>
                  <atomic-result-section-title>
                    <atomic-result-link></atomic-result-link>
                  </atomic-result-section-title>
                  <atomic-result-section-excerpt>
                    <atomic-result-text field="excerpt"></atomic-result-text>
                  </atomic-result-section-excerpt>
                </template>
              </atomic-result-template>
            </atomic-result-list>
          </atomic-layout-section>

          <atomic-layout-section section="pagination">
            <atomic-pager></atomic-pager>
          </atomic-layout-section>
        </atomic-layout-section>
      </atomic-search-layout>
    </atomic-search-interface>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
