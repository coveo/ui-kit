      - num: 2.4.5
        components:
          - name: web
            adherence:
              level: not-applicable
              notes:
                Multiple navigation ways are a host application concern, not a component
                library concern.
      - num: 2.4.6
        components:
          - name: web
            adherence:
              level: does-not-support
              notes: Does Not Support — manual audit found Does Not Support
                (atomic-tab-manager renders a tablist with aria-label="tab-area"
                — a non-descriptive technical placeholder. Screen reader users
                navigating by landmark or tab group hear "tab-area" instead of a
                meaningful description of the tab purpose (e.g., "Content type
                tabs"), making it difficult to understand the interface
                structure.).
      - num: 2.4.7
        components:
          - name: web
            adherence:
              level: supports
              notes:
                Focus indicators provided by design system (Tailwind focus-visible:ring-*
                utilities). All instances of outline:none are paired with
                :focus-visible alternatives.
      - num: 2.4.11
        components:
          - name: web
            adherence:
