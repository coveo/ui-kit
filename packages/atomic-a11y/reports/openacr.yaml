            adherence:
              level: not-applicable
              notes:
                No Atomic component implements custom dragging movements. Scrollable
                containers use native CSS overflow (user-agent scrolling, exempt
                per 2.5.7) with arrow button alternatives. Modal touchmove
                listeners only prevent background scrolling.
