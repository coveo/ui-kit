<template>
  <template lwc:if={shouldDisplayGeneratedAnswer}>
    <div data-testid="generated-answer__card" class="slds-box">
      <div
        class="generated-answer__card-header slds-grid slds-grid_vertical-align-center slds-border_bottom"
      >
        <lightning-icon
          icon-name="utility:sparkles"
          size="xx-small"
          class="slds-current-color slds-m-right_x-small generated-answer__header-icon"
        ></lightning-icon>
        <span
          data-testid="generated-answer__badge"
          class="slds-text-title_bold generated-answer__badge"
          >{labels.generatedAnswerForYou}</span
        >
        <template lwc:if={withToggle}>
          <div class="slds-col_bump-left">
            <c-quantic-generated-answer-toggle
              is-generated-answer-visible={isVisible}
            ></c-quantic-generated-answer-toggle>
          </div>
        </template>
      </div>

      <template lwc:if={isVisible}>
        <div class="generated-answer__content slds-var-m-top_medium">
          <div
            data-testid="generated-answer__answer"
            class={generatedAnswerClass}
          >
            <template lwc:if={shouldRenderThread}>
              <c-quantic-generated-answer-thread
                engine-id={engineId}
                generated-answers={normalizedGeneratedAnswers}
                disable-citation-anchoring={disableCitationAnchoring}
              ></c-quantic-generated-answer-thread>
            </template>
            <template lwc:else>
              <c-quantic-generated-answer-body
                engine-id={engineId}
                generated-answer={state}
                disable-citation-anchoring={disableCitationAnchoring}
                onquantic__like={handleLike}
                onquantic__dislike={handleDislike}
                onquantic__generatedanswercopy={handleGeneratedAnswerCopyToClipboard}
                onquantic__citationhover={handleCitationHover}
                onquantic__answercontentupdated={handleAnswerContentUpdated}
              ></c-quantic-generated-answer-body>
            </template>
          </div>
          <template lwc:if={shouldShowSingleAnswerCollapseControls}>
            <div class="slds-grid slds-grid_align-spread slds-var-m-top_small">
              <template lwc:if={shouldShowCollapseGeneratingMessage}>
                <div
                  data-testid="generated-answer__collapse-generating-message"
                  class="generated-answer__collapse-generating-message"
                >
                  {labels.generatingAnswer}...
                </div>
              </template>
              <template lwc:if={shouldShowToggleCollapseAnswer}>
                <lightning-button
                  data-testid="generated-answer__answer-toggle"
                  icon-name={toggleCollapseAnswerIcon}
                  variant="base"
                  label={toggleCollapseAnswerLabel}
                  title={toggleCollapseAnswerLabel}
                  onclick={handleToggleCollapseAnswer}
                  icon-position="right"
                  class="generated-answer__answer-toggle slds-shrink-none slds-var-m-right_large"
                ></lightning-button>
              </template>
            </div>
          </template>
          <template lwc:if={areFollowUpsEnabled}>
            <c-quantic-ask-follow-up-input
              data-testid="generated-answer__ask-follow-up-input"
              submit-button-disabled={isAnswerGenerationOngoing}
            ></c-quantic-ask-follow-up-input>
          </template>
          <template lwc:if={shouldShowDisclaimer}>
            <div
              class="slds-grid slds-grid_align-end slds-var-m-top_x-small slds-text-body_small slds-text-color_weak"
              data-testid="generated-answer__disclaimer"
            >
              <slot name="disclaimer"> {labels.rgaDisclaimer} </slot>
            </div>
          </template>
        </div>
      </template>
    </div>
  </template>

  <template lwc:if={cannotAnswer}>
    <template lwc:if={isManualAnswerGeneration}>
      <div data-testid="generated-answer__no-answer-card" class="slds-box">
        <div
          class="generated-answer__card-header slds-grid slds-grid_vertical-align-center slds-border_bottom"
        >
          <lightning-icon
            icon-name="utility:sparkle"
            size="xx-small"
            class="slds-current-color slds-m-right_x-small generated-answer__header-icon"
          ></lightning-icon>
          <span class="slds-text-title_bold generated-answer__badge"
            >{labels.generatedAnswerForYou}</span
          >
        </div>
        <div
          data-testid="generated-answer__no-answer-message"
          class="generated-answer__content slds-var-m-top_medium"
        >
          <div class={generatedAnswerClass}>
            <slot name="no-answer-message">{labels.noGeneratedAnswer}</slot>
          </div>
        </div>
      </div>
    </template>
    <template lwc:else>
      <template lwc:if={hasCustomNoAnswerMessage}>
        <div data-testid="generated-answer__no-answer-card" class="slds-box">
          <div
            class="generated-answer__card-header slds-grid slds-grid_vertical-align-center slds-border_bottom"
          >
            <lightning-icon
              icon-name="utility:sparkle"
              size="xx-small"
              class="slds-current-color slds-m-right_x-small generated-answer__header-icon"
            ></lightning-icon>
            <span class="slds-text-title_bold generated-answer__badge"
              >{labels.generatedAnswerForYou}</span
            >
          </div>
          <div class="generated-answer__content slds-var-m-top_medium">
            <div class={generatedAnswerClass}>
              <slot name="no-answer-message"> </slot>
            </div>
          </div>
        </div>
      </template>
    </template>
  </template>
  <div class="slds-hide">
    <slot name="no-answer-message"></slot>
  </div>
</template>
