<template>
  <li class="thread-item">
    <div class="thread-item__grid">
      <div class="slds-grid slds-grid_vertical slds-grid_vertical-align-center thread-item__timeline">
        <div
          class="slds-grid slds-grid_align-center slds-grid_vertical-align-center thread-item__dot-column"
        >
          <span class={dotClass} data-testid="thread-item-dot"></span>
        </div>
        <template lwc:if={shouldDisplayLine}>
          <span class="thread-item__line" data-testid="thread-item-line"></span>
        </template>
      </div>
      <div class="slds-has-flexi-truncate">
        <template lwc:if={disableCollapse}>
          <span class={titleClass} data-testid="thread-item-title-static"
            >{title}</span
          >
        </template>
        <template lwc:else>
          <button
            type="button"
            class={titleButtonClass}
            aria-expanded={isExpanded}
            data-testid="thread-item-title-button"
            onclick={handleTitleClick}
            aria-controls="thread-item-content"
          >
            {title}
          </button>
        </template>
      </div>
      <div
        id="thread-item-content"
        class="slds-p-left_x-small slds-p-vertical_xx-small thread-item__content"
        data-testid="thread-item-content"
      >
        <div hidden={contentHidden}>
          <slot></slot>
        </div>
      </div>
    </div>
  </li>
</template>
