<template>
  <div class={inputContainerClasses}>
    <div class="follow-up-input__expander slds-grow" lwc:ref="expander">
      <textarea
        class="follow-up-input__textarea"
        lwc:ref="askFollowUpInput"
        rows="1"
        placeholder={labels.askFollowUp}
        aria-label={labels.askFollowUp}
        aria-invalid={textareaAriaInvalid}
        aria-describedby={textareaAriaDescribedBy}
        onfocus={handleFocus}
        onblur={handleBlur}
        oninput={handleInput}
        onkeydown={handleKeyDown}
      ></textarea>
    </div>
    <lightning-button-icon
      disabled={isSubmitDisabled}
      onclick={handleSubmitFollowUp}
      icon-name="utility:arrowup"
      variant="brand"
      class="follow-up-input__submit-button"
      name="submit-follow-up"
      title={labels.submitFollowUp}
      aria-label={labels.submitFollowUp}
      alternative-text={labels.submitFollowUp}
    >
      <label>{labels.submitFollowUp}</label>
    </lightning-button-icon>
  </div>
  <div
    class="follow-up-input__footer slds-grid slds-p-horizontal_x-small slds-p-top_xx-small"
  >
    <template lwc:if={isOverCharacterLimit}>
      <span
        id="follow-up-validation-message"
        class="slds-text-body_small slds-text-color_error"
        role="alert"
        >{validationMessage}
      </span>
    </template>
    <span class={characterCounterClasses}>{characterCounterText}</span>
  </div>
</template>
